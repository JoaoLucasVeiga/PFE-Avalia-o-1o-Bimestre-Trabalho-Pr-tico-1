<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GameVault - Loja digital de jogos">
    <title>GameVault - Loja de Jogos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header" role="banner">
        <div class="container">
            <div class="logo">
                <span>🎮</span>
                <h1>GameVault</h1>
            </div>
            <nav class="nav-buttons">
                <button class="nav-btn" id="homeBtn" aria-label="Ir para início">🏠 Início</button>
                <button class="nav-btn" id="favoritesBtn" aria-label="Ver favoritos">❤️ Favoritos</button>
                <button class="cart-btn" id="cartBtn" aria-label="Carrinho">🛒 <span id="cartCount">0</span></button>
            </nav>
        </div>
    </header>

    <!-- Main -->
    <main role="main">
        <!-- Hero -->
        <section class="hero">
            <img src="hero.png" alt="GameVault - Bem-vindo à loja de jogos">
            <div class="hero-text">
                <h2>Bem-vindo ao GameVault</h2>
                <p>Os melhores jogos com preços incríveis</p>
            </div>
        </section>

        <!-- Filtros -->
        <section class="filters">
            <div class="container">
                <h3>Filtrar Jogos</h3>
                <div class="filter-row">
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Buscar por nome..."
                        aria-label="Buscar jogos">
                    <select id="categoryFilter" aria-label="Filtrar por categoria">
                        <option value="">Todas as categorias</option>
                        <option value="Ação">Ação</option>
                        <option value="RPG">RPG</option>
                        <option value="Aventura">Aventura</option>
                        <option value="Luta">Luta</option>
                        <option value="Casual">Casual</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Catálogo -->
        <section class="catalog">
            <div class="container">
                <h2>Catálogo de Jogos</h2>
                <div class="games-grid" id="gamesGrid"></div>
            </div>
        </section>

        <!-- Página de Favoritos (oculta por padrão) -->
        <section class="favorites-section" id="favoritesSection" style="display: none;">
            <div class="container">
                <h2>Meus Favoritos</h2>
                <div class="games-grid" id="favoritesGrid"></div>
                <div id="emptyFavorites" class="empty-msg" style="display: none;">Você ainda não tem favoritos</div>
            </div>
        </section>

        <!-- Contato -->
        <section class="contact">
            <div class="container">
                <h2>Entre em Contato</h2>
                <form id="contactForm" class="contact-form" aria-label="Formulário de contato">
                    <div class="form-group">
                        <label for="name">Nome:</label>
                        <input type="text" id="name" name="name" required aria-required="true">
                        <span class="error" id="nameError"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required aria-required="true">
                        <span class="error" id="emailError"></span>
                    </div>
                    <div class="form-group">
                        <label for="message">Mensagem:</label>
                        <textarea id="message" name="message" rows="5" required aria-required="true"></textarea>
                        <span class="error" id="messageError"></span>
                    </div>
                    <button type="submit" class="btn-submit">Enviar</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Modal Carrinho -->
    <div id="cartModal" class="modal" role="dialog" aria-labelledby="cartTitle" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="cartTitle">Seu Carrinho</h2>
                <button class="modal-close" id="closeCartBtn" aria-label="Fechar">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cartItems"></div>
                <div id="cartEmpty" class="empty-msg">Carrinho vazio</div>
            </div>
            <div class="modal-footer">
                <div id="cartSummary"></div>
                <button id="checkoutBtn" class="btn-checkout">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 GameVault. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
